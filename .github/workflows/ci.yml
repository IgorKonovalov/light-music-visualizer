# NFR section 7: build, test, clippy, fmt on Windows + macOS for every push.
# GPU rendering and live audio are out of CI scope - those checks stay manual.
name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # rustup on the runner auto-installs the toolchain pinned in rust-toolchain.toml.
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo build
      # nextest for parallelism + per-test isolation; it does not run doctests,
      # so cover those separately.
      - run: cargo nextest run
      - run: cargo test --doc
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --all --check

  # Supply-chain gate (deny.toml): advisories, licenses, bans, sources.
  # Platform-independent (reads Cargo.lock + the [graph] targets in deny.toml),
  # so it runs once on the cheapest runner.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  # UB gate (Plan 0005, unblocking Plan 0002's deferred Phase 5). Miri checks
  # the SPSC ring's `unsafe` - the only pure-Rust unsafe in the tree. It runs
  # against lmv-ring alone: a zero-dependency crate with no wgpu/naga graph, so
  # Miri compiles and interprets it in seconds instead of the whole render
  # stack. Platform-independent unsafe, so once on the cheapest runner.
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --component miri
      - uses: Swatinem/rust-cache@v2
      - run: cargo +nightly miri test -p lmv-ring
