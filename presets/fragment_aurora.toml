# Aurora - cool cyan-green curtains that sway on their own like polar light. Medium
# zoom for a moderate spread through the cool band (azure->green), anchored so it
# stays out of the warm end; a slow sin sways the hue back and forth (not a monotonic
# drift). Bass swells the fold; an independent slow sin keeps it alive when quiet.
system = "fragment_field"
name = "Aurora"

[params]
warp  = "0.42 + sin(time * 0.11) * 0.1 + clamp(bass * 9, 0, 0.7)"
hue   = "0.15 + sin(time * 0.07) * 0.05 + clamp(treb * 3, 0, 0.05)"
zoom  = "0.85 + sin(time * 0.05) * 0.06 + bar * 0.1"
glow  = "0.5 + clamp((bass + mid) * 7, 0, 0.95)"
flash = "clamp(onset * 2.5, 0, 0.8)"
