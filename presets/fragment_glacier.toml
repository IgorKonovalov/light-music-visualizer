# Glacier - calm and cool: a wide, slow field with barely any warp, a long zoom
# breath on the bar phase, and a cold hue that drifts almost imperceptibly. The
# quiet end of the fragment set.
system = "fragment_field"
name = "Glacier"

[params]
warp  = "0.25 + clamp(bass * 6, 0, 0.6)"
hue   = "0.55 + time * 0.008"
zoom  = "1.15 + bar * 0.35"
glow  = "0.45 + clamp(mid * 5, 0, 0.7)"
flash = "clamp(onset * 1.5, 0, 0.4)"
