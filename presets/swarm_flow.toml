# Flow - laminar and calm: a SLOW-evolving flow field (low spin) so particles trace
# long, coherent streamlines, mid-sized and steady. Bass firms the steering, a slow
# sin keeps it alive when quiet, beats give a small outward nudge. The gentle,
# readable end of the swarm set.
system = "swarm"
name = "Flow"

[params]
force      = "1.1 + sin(time * 0.1) * 0.2 + clamp(bass * 16, 0, 3)"
spin       = "0.16 + clamp(mid * 4, 0, 0.6)"
burst      = "beat * 4"
hue        = "time * 0.03"
brightness = "0.65 + clamp(bass * 6, 0, 0.8)"
size       = "2.0 + beat * 0.5"
