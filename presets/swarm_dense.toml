# Dense - a shimmering cloud: medium bright particles churned by a FAST field (high
# spin) so the whole mass sparkles and reforms. The shimmer comes from the churn
# speed, not tiny dots (tiny particles just vanish on this scene). Treble lights the
# sparkle, mids drive the churn, beats give a crisp shove. Reads as one glittering body.
system = "swarm"
name = "Dense"

[params]
force      = "1.5 + clamp(mid * 12, 0, 3)"
spin       = "0.9 + clamp(treb * 8, 0, 1.6)"
burst      = "beat * 3"
hue        = "0.6 + time * 0.03"
brightness = "0.7 + clamp(treb * 7, 0, 0.95)"
size       = "1.5 + beat * 0.3"
