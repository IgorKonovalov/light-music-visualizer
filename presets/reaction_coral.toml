# Coral - a Gray-Scott reaction-diffusion field (ADR-0012). The engine's first
# stateful feedback scene: the pattern grows and reorganizes frame to frame in
# the mitosis regime (spots that perpetually divide).
#
# The band energies steer the regime and beats spawn new growth:
#   - bass pushes the feed rate, mid the kill rate (silent -> mitosis, loud ->
#     coral), staying inside the pattern-forming band so the field never dies;
#   - treble scales the diffusion, coarsening the spatial texture;
#   - each beat stamps a fresh seed of growth into the field.
# The iso-contour / palette look lands in a later phase (still grayscale here).
#
# Variables available to expressions: bass mid treb onset beat bar time.
system = "reaction_diffusion"
name = "Coral"

[params]
feed = "0.032 + clamp(bass * 4, 0, 1) * 0.018"
kill = "0.060 + clamp(mid * 4, 0, 1) * 0.002"
flow = "1.0 + clamp(treb * 4, 0, 1) * 0.4"
inject = "beat"
