# Ember - warm and cohesive: low zoom keeps the color in a single molten red/orange
# band (the warm mirror of Glacier's cool), big slow blobs rather than fine cells.
# Low warp so it smoulders; mids build a steady bloom that bass swells. Warm, dense,
# unhurried.
system = "fragment_field"
name = "Ember"

[params]
warp  = "0.22 + clamp(bass * 6, 0, 0.5)"
hue   = "0.6 + sin(time * 0.03) * 0.02"
zoom  = "0.62 + clamp(mid * 2, 0, 0.15)"
glow  = "0.75 + clamp((mid + bass) * 8, 0, 1.3)"
flash = "clamp(onset * 3, 0, 0.9)"
