# Burst - explosive and punctuated: mostly a quiet mid-speed swarm that DETONATES on
# every beat - a huge radial blast plus an onset kick - and the particles swell as
# they fly. Between beats it re-gathers. The most percussive swarm.
system = "swarm"
name = "Burst"

[params]
force      = "1.3 + clamp(bass * 18, 0, 4)"
spin       = "0.4 + clamp(mid * 6, 0, 1.2)"
burst      = "beat * 10 + clamp(onset * 5, 0, 5)"
hue        = "0.42 + time * 0.05"
brightness = "0.65 + clamp((bass + treb) * 5, 0, 1.0)"
size       = "1.6 + beat * 1.3"
