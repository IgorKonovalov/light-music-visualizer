# Pulse Field - violet/magenta and hard on the beat: higher zoom gives a busier,
# more multi-hued field (energetic looks earn the spread), every beat kicks the fold
# and nudges the color, every onset throws a bright strobe. Bass drives the zoom in.
# It reads the rhythm, not the drift.
system = "fragment_field"
name = "Pulse Field"

[params]
warp  = "0.5 + beat * 0.7 + clamp(bass * 9, 0, 1.0)"
hue   = "0.12 + beat * 0.06 + clamp(mid * 3, 0, 0.05)"
zoom  = "1.3 + clamp(bass * 5, 0, 0.4) + beat * 0.15"
glow  = "0.5 + clamp(mid * 9, 0, 1.0)"
flash = "clamp(onset * 5, 0, 1.2)"
