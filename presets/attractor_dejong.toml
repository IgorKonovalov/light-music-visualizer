# De Jong - the engine's first GPU compute-particle scene (ADR-0015, Plan 0016).
# A storage buffer of 50k particles is stepped through the De Jong strange-
# attractor map by a compute shader each frame and drawn as additive glowing
# points, so a dense, slowly-turning point cloud boils along the attractor's
# fractal curves. The whole cloud rotates gently over time.
#
# Phase 1 exposes two named params (size, hue); the attractor coefficients and a
# beat kick land in Plan 0016 Phase 3. Here bass swells the points and the hue
# drifts slowly with time.
#
# Variables available to expressions: bass mid treb onset beat bar time.
system = "attractor"
name = "De Jong"

[params]
size = "1.0 + clamp(bass * 3, 0, 1) * 0.9"
hue  = "time * 0.05"
