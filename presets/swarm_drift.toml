# Drift - ambient and weightless: a nearly FROZEN field with LARGE, bright, soft
# particles and almost no burst, so the swarm stays gathered and readable instead of
# blown to the edges. Bass gives a slow breathing motion. The quiet, spacious end -
# and the densest-reading swarm, since big low-burst particles fill the frame.
system = "swarm"
name = "Drift"

[params]
force      = "0.8 + sin(time * 0.06) * 0.15 + clamp(bass * 8, 0, 1.2)"
spin       = "0.09 + clamp(mid * 2, 0, 0.22)"
burst      = "beat * 0.8"
hue        = "time * 0.012"
brightness = "0.8 + clamp(bass * 5, 0, 0.8)"
size       = "3.2 + beat * 0.6"
