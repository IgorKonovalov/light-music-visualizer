# Standalone desktop shell: winit window + OS loopback capture feeding lmv-core.
[package]
name = "standalone"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "lmv"
path = "src/main.rs"

[dependencies]
lmv-core = { path = "../core" }
# Windowing (ADR-0001 fixes winit for the standalone shell).
winit = "=0.30.13"
