# GOLDEN FIXTURE - do not tune; editing this invalidates the drift baseline (ADR-0023)
# Minimal parametric_curve: a static 6-petal Maurer rose (spin = 0) so the drawn
# geometry sits in a canonical, drift-catchable orientation.
system = "parametric_curve"
name   = "fixture_parametric_curve"

[curve]
family = "maurer_rose"

[params]
n             = "6"
d             = "71"
samples       = "361"
scale         = "0.8"
spin          = "0"
hue           = "0.55"
thickness     = "2.0"
brightness    = "0.9"
draw_progress = "1"
